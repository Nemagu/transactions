fastapi:
  user_id_header_name: X-User-Id

uvicorn:
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false
  loop: uvloop

db:
  host: localhost
  port: 5432
  user: transactions_user
  password_file: /run/secrets/transactions_db_password
  database: transactions
  pool:
    min_size: 10
    max_size: 20
    max_inactive_connection_lifetime: 300
    max_connection_lifetime: 3600
    timeout: 20
